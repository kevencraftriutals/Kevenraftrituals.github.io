<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevencraftrituals</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Keven Craft Rituals</h1>
        <div id="cloudflare-status">
            <h2>Cloudflare Status</h2>
            <p id="status"></p>
        </div>
    </header>
    <main>
        <section>
            <h2 class="collapsible">Collapsible Section 1</h2>
            <div class="content">
                <p>Content for section 1.</p>
            </div>
        </section>
        <section>
            <h2 class="collapsible">Collapsible Section 2</h2>
            <div class="content">
                <p>Content for section 2.</p>
            </div>
        </section>
    </main>
    <script>
        $(document).ready(function() {
            $('.collapsible').click(function() {
                $(this).next('.content').slideToggle();
            });

            // Cloudflare Status Integration
            $.get('https://api.cloudflarestatus.com/v1/status.json', function(data) {
                $('#status').text(data['status']['description']);
            });
        });
    </script>
</body>
</html>
